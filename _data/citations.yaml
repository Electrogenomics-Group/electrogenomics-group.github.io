- id: doi:10.1093/ehjdh/ztaf013
  title: Unsupervised clustering of single-lead electrocardiograms associates with
    prevalent and incident heart failure in coronary artery disease
  authors:
  - Josseline Madrid
  - William J Young
  - Stefan van Duijvenboden
  - Michele Orini
  - Patricia B Munroe
  - "Julia Ram\xEDrez"
  - "Ana Minchol\xE9"
  publisher: European Heart Journal - Digital Health
  date: '2025-03-17'
  link: https://doi.org/g89qg5
  image: https://oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/ehjdh/PAP/10.1093_ehjdh_ztaf013/2/m_ztaf013f1.jpeg?Expires=1745918098&Signature=Q~RaYEU2uCmvePPkiNVOBH~oI6M4t3MLvv71k2XGKv8hRazArDeWXraJ-OZF1eGJ4D76bXdthmhWbRPAuwD~~47TZtZl9Q~Twur8zqYcKdooEPtfRgFX~ncxi~vTC7gEVSpTfCXDoPl~hEstN5n5iTl9WsCLM6p7oPhxQxD0~9VnHC2BRFM-7ZSgLAXhYrgvnHRJsIYIc~Lhzl-CIsBCYqV49-P36YMtbDfo3hZYPPrPBpHH6naw33plHp~FlmLUs5i1VlDxqr4JJhId3PoIcr8708dD~GqMyBRinEp4IPDSciUTmdKRjmZUp0-lVMnAtC1ZOSic~bG2zG5Jqr-SFw__&Key-Pair-Id=APKAIE5G5CRDK6RD3PGA
  description: "Clinical consequences of coronary artery disease (CAD) are varied\
    \ [e.g. atrial fibrillation (AF) and heart failure (HF)], and current risk stratification\
    \ tools are ineffective. In this study, we developed, tested, and validated a\
    \ model to identify distinct ECG-based morphological clusters of individuals with\
    \ CAD in an unsupervised manner using short 10\u2005s single-lead ECGs. The main\
    \ finding of this study is the identification of individuals with CAD mapping\
    \ to two distinct ECG morphological clusters, of which Cluster 1, relative to\
    \ Cluster 2, showed a stronger association with both incident and prevalent HF,\
    \ independently of age, sex, and other clinical variables. These findings hold\
    \ significant implications for targeted treatment and prevention enabling accessible\
    \ large-scale screening."
  plugin: sources.py
  file: sources.yaml
