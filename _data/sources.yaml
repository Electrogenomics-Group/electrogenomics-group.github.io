  description: "Clinical consequences of coronary artery disease (CAD) are varied [e.g. atrial fibrillation (AF) and heart failure (HF)], and current risk stratification tools are ineffective. In this study, we developed, tested, and validated a model to identify distinct ECG-based morphological clusters of individuals with CAD in an unsupervised manner using short 10 s single-lead ECGs. The main finding of this study is the identification of individuals with CAD mapping to two distinct ECG morphological clusters, of which Cluster 1, relative to Cluster 2, showed a stronger association with both incident and prevalent HF, independently of age, sex, and other clinical variables. These findings hold significant implications for targeted treatment and prevention enabling accessible large-scale screening."
